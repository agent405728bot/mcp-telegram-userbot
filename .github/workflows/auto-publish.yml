name: Auto-publish on Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Read base version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          echo "base=${BASE_VERSION}" >> $GITHUB_OUTPUT

      - name: Determine next build tag number
        id: build
        run: |
          BASE_VERSION='${{ steps.version.outputs.base }}'
          LAST_TAG=$(git tag -l "v${BASE_VERSION}-*" | sed -E 's/^v.*-([0-9]+)$/\1/' | sort -n | tail -n 1)
          if [ -z "$LAST_TAG" ]; then
            NEXT=1
          else
            NEXT=$((LAST_TAG + 1))
          fi
          VERSION="${BASE_VERSION}-${NEXT}"
          echo "next=${NEXT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Skip if already published
        id: publish_check
        continue-on-error: true
        run: |
          npm view @agent405728bot/mcp-telegram-userbot@${{ steps.build.outputs.version }} version >/dev/null 2>&1
          echo "exists=true" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Packages
        if: steps.publish_check.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        if: steps.publish_check.outputs.exists != 'true'
        run: |
          VERSION='${{ steps.build.outputs.version }}'
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${VERSION}" -m "Auto-published: ${VERSION}"
          git push origin "v${VERSION}"

      - name: Report Status
        if: always()
        run: |
          echo "### 📦 Auto-Publish Report" >> $GITHUB_STEP_SUMMARY
          echo "**Base Version:** ${{ steps.version.outputs.base }}" >> $GITHUB_STEP_SUMMARY
          echo "**Next Build Number:** ${{ steps.build.outputs.next }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Published:** ${{ steps.publish_check.outputs.exists != 'true' }}" >> $GITHUB_STEP_SUMMARY
