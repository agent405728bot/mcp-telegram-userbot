name: Auto-publish on Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Get commit info
        id: commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "short=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "message=${COMMIT_MSG}" >> $GITHUB_OUTPUT

      - name: Check if published version exists
        id: version_check
        continue-on-error: true
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          NEW_VERSION="${CURRENT}-${SHORT_SHA}"
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT
          npm view @agent405728bot/mcp-telegram-userbot@${NEW_VERSION} version 2>&1 | grep -q "${NEW_VERSION}" && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Update version with commit hash
        if: steps.version_check.outputs.exists != 'true'
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          NEW_VERSION="${CURRENT}-${SHORT_SHA}"
          node -e "const pkg = require('./package.json'); pkg.version = '${NEW_VERSION}'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n')"
          echo "✓ Updated version to: ${NEW_VERSION}"

      - name: Publish to GitHub Packages
        if: steps.version_check.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        if: steps.version_check.outputs.exists != 'true'
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${NEW_VERSION}" -m "Auto-published: ${NEW_VERSION}"
          git push origin "v${NEW_VERSION}" 2>&1 || echo "Tag push skipped (may already exist)"

      - name: Report Status
        if: always()
        run: |
          echo "### 📦 Auto-Publish Report" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ steps.commit.outputs.short }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Exists:** ${{ steps.version_check.outputs.exists }}" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** ${{ steps.version_check.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version_check.outputs.exists }}" == "true" ]; then
            echo "✅ Version already published, skipping." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Published to GitHub Packages" >> $GITHUB_STEP_SUMMARY
          fi
